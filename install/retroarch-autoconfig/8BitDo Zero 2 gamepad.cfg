# 8BitDo Zero 2 in X-input mode (hold X+Start at power-on; pairs as an
# Xbox-compatible pad, 045e:02e0). The official libretro profile covers
# only D-input mode and its button numbers don't apply here.
# Verified on this pad: Select=6 / Start=7 (the working quit combo).

input_driver = "udev"
input_device = "8BitDo Zero 2 gamepad"
input_device_display_name = "8BitDo Zero 2 (X-input)"
input_vendor_id = "1118"
input_product_id = "736"

input_b_btn = "0"
input_a_btn = "1"
input_y_btn = "2"
input_x_btn = "3"
input_l_btn = "4"
input_r_btn = "5"
input_select_btn = "6"
input_start_btn = "7"

input_up_btn = "h0up"
input_down_btn = "h0down"
input_left_btn = "h0left"
input_right_btn = "h0right"

input_b_btn_label = "B"
input_a_btn_label = "A"
input_y_btn_label = "Y"
input_x_btn_label = "X"
input_l_btn_label = "L"
input_r_btn_label = "R"
input_select_btn_label = "Select"
input_start_btn_label = "Start"
input_up_btn_label = "Dpad Up"
input_down_btn_label = "Dpad Down"
input_left_btn_label = "Dpad Left"
input_right_btn_label = "Dpad Right"
